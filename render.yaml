services:
  - type: web
    name: finalert-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/finalert-backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0